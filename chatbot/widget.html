<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawsome Resort — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: transparent; }

  /* ── LAUNCHER BUTTON ── */
  .launcher {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: #2B7EC1; color: #fff;
    border: none; cursor: pointer; font-size: 24px;
    box-shadow: 0 4px 20px rgba(232,168,124,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; transition: all 0.2s ease;
  }
  .launcher:hover { transform: scale(1.08); }
  .launcher .close-icon { display: none; }
  .launcher.open .open-icon { display: none; }
  .launcher.open .close-icon { display: block; }

  /* ── CHAT WINDOW ── */
  .chat-window {
    position: fixed; bottom: 92px; right: 24px;
    width: 360px; max-height: 540px;
    background: #0D1117; border: 1px solid #21262D;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    z-index: 9998;
    transform: translateY(20px) scale(0.95);
    opacity: 0; pointer-events: none;
    transition: all 0.25s ease;
  }
  .chat-window.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }

  @media (max-width: 420px) {
    .chat-window { width: calc(100vw - 32px); right: 16px; bottom: 84px; }
    .launcher { right: 16px; bottom: 16px; }
  }

  .chat-header {
    background: #161B22; border-bottom: 1px solid #21262D;
    padding: 14px 16px; display: flex; align-items: center; gap: 10px;
  }
  .chat-header .avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(43,126,193,0.15); font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .chat-header-info h3 { font-size: 14px; font-weight: 500; color: #E6EDF3; }
  .chat-header-info p { font-size: 11px; color: #5BBF45; }
  .online-dot { width: 8px; height: 8px; background: #5BBF45; border-radius: 50%; margin-right: 4px; display: inline-block; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 10px; min-height: 0;
    max-height: 380px;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #2D333B; border-radius: 3px; }

  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }

  .msg-bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 12px;
    font-size: 13px; line-height: 1.5;
  }
  .msg.bot .msg-bubble { background: #161B22; color: #C9D1D9; border-radius: 12px 12px 12px 4px; }
  .msg.user .msg-bubble { background: #2B7EC1; color: #0D1117; border-radius: 12px 12px 4px 12px; }

  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(43,126,193,0.15); font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .typing span { width: 6px; height: 6px; background: #8B949E; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .quick-replies { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 10px; }
  .qr-btn {
    padding: 6px 12px; border-radius: 20px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    background: transparent; border: 1px solid #2B7EC1; color: #2B7EC1;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .qr-btn:hover { background: #2B7EC1; color: #0D1117; }

  .chat-input-area {
    border-top: 1px solid #21262D; padding: 12px;
    display: flex; gap: 8px; align-items: center;
  }
  .chat-input {
    flex: 1; background: #161B22; border: 1px solid #2D333B; color: #E6EDF3;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 9px 14px; border-radius: 20px; outline: none;
    transition: border 0.15s;
  }
  .chat-input:focus { border-color: #2B7EC1; }
  .chat-input::placeholder { color: #8B949E; }
  .send-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #2B7EC1;
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 14px; transition: all 0.15s; flex-shrink: 0;
  }
  .send-btn:hover { background: #F0B88C; }

  /* Lead Capture Form */
  .lead-form { padding: 12px 16px; background: #161B22; border-top: 1px solid #21262D; }
  .lead-form h4 { font-size: 13px; color: #E6EDF3; margin-bottom: 10px; }
  .lf-input { width: 100%; background: #0D1117; border: 1px solid #2D333B; color: #E6EDF3; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; outline: none; }
  .lf-input:focus { border-color: #2B7EC1; }
  .lf-btn { width: 100%; background: #2B7EC1; color: #0D1117; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 9px; border-radius: 8px; cursor: pointer; }
  .lf-btn:hover { background: #F0B88C; }
</style>
</head>
<body>

<button class="launcher" id="launcher" onclick="toggleChat()">
  <span class="open-icon">🐾</span>
  <span class="close-icon">✕</span>
</button>

<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <div class="avatar">🐾</div>
    <div class="chat-header-info">
      <h3>Pawsome Resort</h3>
      <p><span class="online-dot"></span>Online — reply in seconds</p>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="quick-replies" id="quickReplies"></div>
  <div id="leadFormArea"></div>
  <div class="chat-input-area">
    <input class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="handleKey(event)">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script src="widget.js"></script>
</body>
</html>
