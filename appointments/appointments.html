<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments — Pawsome Resort</title>
<link rel="stylesheet" href="../js/shared.css">
<style>
  .date-nav { display:flex;align-items:center;gap:12px; }
  .date-nav button { background:var(--surface2);border:1px solid var(--border2);color:var(--text);width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
  .date-nav button:hover { border-color:var(--accent);color:var(--accent); }
  #dateDisplay { font-size:15px;font-weight:500;min-width:180px;text-align:center; }

  .timeline { position:relative;padding:0 0 16px; }
  .tl-hour { display:flex;align-items:flex-start;gap:12px;min-height:60px;position:relative; }
  .tl-hour-label { width:52px;font-size:11px;color:var(--muted);padding-top:2px;flex-shrink:0;text-align:right; }
  .tl-line { position:absolute;left:64px;right:0;top:10px;border-top:1px dashed var(--border);z-index:0; }
  .tl-slots { flex:1;min-height:60px;position:relative;padding-left:12px; }

  .appt-block {
    position:relative; z-index:1;
    background:var(--surface2); border:1px solid var(--border2); border-left:3px solid var(--accent);
    border-radius:8px; padding:8px 12px; margin-bottom:6px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    cursor:pointer; transition:all 0.15s;
  }
  .appt-block:hover { border-color:var(--accent); background:var(--accent-dim); }
  .appt-block.grooming { border-left-color:var(--green); }
  .appt-block.swimming { border-left-color:var(--teal); }
  .appt-block.swimming.soon { border-left-color:var(--teal); background: rgba(121,184,255,0.08); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  .appt-time { font-size:12px;color:var(--muted);white-space:nowrap; }
  .appt-pet { font-size:14px;font-weight:500; }
  .appt-service { font-size:12px;color:var(--muted); }
  .appt-info { flex:1; }

  .tabs { display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:10px;margin-bottom:20px;width:fit-content; }
  .tab { padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--font-body);transition:all 0.15s; }
  .tab.active { background:var(--surface);color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.3); }

  .filter-row { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center; }
  .filter-chip { padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);color:var(--muted);background:none;font-family:var(--font-body);transition:all 0.15s; }
  .filter-chip.active { border-color:var(--accent);color:var(--accent);background:var(--accent-dim); }

  /* Client autocomplete */
  .autocomplete-wrap { position:relative; }
  .autocomplete-list {
    position:absolute; top:100%; left:0; right:0; z-index:200;
    background:var(--surface); border:1px solid var(--border2); border-radius:8px;
    max-height:200px; overflow-y:auto; box-shadow:var(--shadow);
  }
  .autocomplete-item {
    padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border);
    transition:background 0.1s;
  }
  .autocomplete-item:hover { background:var(--accent-dim); color:var(--accent); }
  .autocomplete-item:last-child { border-bottom:none; }

  /* Bulk select */
  .bulk-bar {
    background:var(--accent-dim); border:1px solid var(--accent); border-radius:10px;
    padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; flex-wrap:wrap; gap:8px;
  }
  .appt-checkbox { width:16px; height:16px; cursor:pointer; accent-color:var(--accent); }

  /* Pending payments table */
  .payment-row-paid td { opacity:0.5; }
  .payment-badge-paid { color:var(--green); font-weight:500; font-size:12px; }
  .payment-badge-unpaid { color:var(--red); font-weight:500; font-size:12px; }
</style>
</head>
<body>

<div id="sidebar" class="sidebar"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="topbar-title">Appointments</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="exportDayPDF()" title="Export today's appointments">📥 Export</button>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ New</button>
    </div>
  </div>

  <div class="page-content">

    <!-- Tabs -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
      <div class="tabs">
        <button class="tab active" id="tabSchedule" onclick="switchTab('schedule')">📅 Schedule</button>
        <button class="tab" id="tabPending" onclick="switchTab('pending')">💰 Pending Payments</button>
      </div>
    </div>

    <!-- SCHEDULE TAB -->
    <div id="scheduleTab">
      <!-- Date Nav -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div class="date-nav">
          <button onclick="shiftDate(-1)">‹</button>
          <span id="dateDisplay"></span>
          <button onclick="shiftDate(1)">›</button>
          <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
        </div>
        <div class="filter-row" style="margin:0;">
          <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All</button>
          <button class="filter-chip" data-filter="grooming" onclick="setFilter('grooming',this)">✂️ Grooming</button>
          <button class="filter-chip" data-filter="swimming" onclick="setFilter('swimming',this)">🏊 Swimming</button>
          <button class="filter-chip" data-filter="boarding" onclick="setFilter('boarding',this)">🏠 Boarding</button>
        </div>
      </div>

      <!-- Summary bar -->
      <div id="apptSummary" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;"></div>

      <!-- Bulk Action Bar -->
      <div class="bulk-bar" id="bulkBar" style="display:none;">
        <span style="font-size:13px;color:var(--accent);"><strong id="bulkCount">0</strong> selected</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="bulkMarkComplete()">✅ Mark Complete</button>
          <button class="btn btn-ghost btn-sm" onclick="bulkMarkCancelled()">✕ Cancel All</button>
          <button class="btn btn-ghost btn-sm" onclick="clearSelection()">Clear</button>
        </div>
      </div>

      <!-- Select All + Timeline -->
      <div class="section-card">
        <div class="section-header">
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="selectAll" class="appt-checkbox" onchange="toggleSelectAll(this)" title="Select all">
            <span class="section-title" id="timelineTitle">Timeline</span>
          </div>
          <span style="font-size:12px;color:var(--muted);" id="apptCount"></span>
        </div>
        <div class="section-body">
          <div id="timeline"></div>
        </div>
      </div>
    </div>

    <!-- PENDING PAYMENTS TAB -->
    <div id="pendingTab" style="display:none;">
      <div id="pendingPaymentsContent"></div>
    </div>

  </div>
</div>

<!-- Add Appointment Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New Appointment</span>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group autocomplete-wrap">
        <label class="form-label">Client Name <span style="color:var(--muted);font-weight:400;">(type to autofill)</span></label>
        <input class="form-input" id="aClientName" placeholder="Suresh Kumar" oninput="clientSearch()" onblur="hideAutocomplete()" autocomplete="off">
        <div class="autocomplete-list" id="clientSuggestions" style="display:none;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Pet Name</label>
        <input class="form-input" id="aPetName" placeholder="Buddy">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="aPhone" placeholder="9845099001">
      </div>
      <div class="form-group">
        <label class="form-label">Service</label>
        <select class="form-select" id="aService" onchange="updateEndTime()">
          <option value="grooming">✂️ Grooming</option>
          <option value="swimming">🏊 Swimming</option>
          <option value="boarding">🏠 Boarding (Check-in)</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="aDate">
      </div>
      <div class="form-group">
        <label class="form-label">Start Time</label>
        <input class="form-input" type="time" id="aStart" onchange="updateEndTime()">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">End Time</label>
        <input class="form-input" type="time" id="aEnd">
      </div>
      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input class="form-input" type="number" id="aAmount" placeholder="850">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="aNotes" placeholder="Optional notes..."></textarea>
    </div>
    <div id="conflictWarning" style="display:none;background:var(--red-dim);border:1px solid var(--red);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:12px;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAppointment()">Book Appointment</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Appointment Details</span>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/whatsapp.js"></script>
<script src="../js/layout.js"></script>
<script src="appointments.js"></script>
</body>
</html>
