<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boarding — Pawsome Resort</title>
<link rel="stylesheet" href="../js/shared.css">
<style>
  .boarding-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px; }
  .boarding-card {
    background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all 0.15s;
  }
  .boarding-card:hover { border-color:var(--accent); }
  .boarding-card.checkout { border-color:var(--yellow);background:rgba(240,192,96,0.04); }
  .boarding-card.checked_out { border-color:var(--green);opacity:0.7; }
  .dog-top { display:flex;align-items:center;gap:10px;margin-bottom:12px; }
  .dog-icon { font-size:32px; }
  .dog-name { font-size:15px;font-weight:500; }
  .dog-breed { font-size:12px;color:var(--muted); }
  .dog-meta { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px; }
  .dog-meta-label { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px; }
  .dog-meta-value { font-size:13px;font-weight:500;margin-top:2px; }
  .capacity-bar { margin-bottom:20px; }
  .cap-row { display:flex;justify-content:space-between;margin-bottom:8px;align-items:center; }
  .card-actions { display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--border); }
  .btn-wa { background:#25D366;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-body);font-weight:500; }
  .btn-cam { background:var(--blue-dim);color:var(--teal);border:1px solid var(--teal);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-body); }
  .unpaid-badge { background:var(--red-dim);color:var(--red);border:1px solid var(--red);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500; }
  .paid-badge { background:var(--green-dim);color:var(--green);border:1px solid var(--green);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500; }
</style>
</head>
<body>

<div id="sidebar" class="sidebar"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="topbar-title">Boarding</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="exportBoardingPDF()">📥 Export</button>
      <button class="btn btn-primary btn-sm" onclick="openCheckin()">+ Check In</button>
    </div>
  </div>

  <div class="page-content">
    <div class="stat-grid" id="boardingStats"></div>

    <!-- Capacity Bar -->
    <div class="section-card" style="margin-bottom:20px;">
      <div class="section-header"><span class="section-title">Occupancy</span></div>
      <div class="section-body" id="capacitySection"></div>
    </div>

    <!-- Pending Payments Alert -->
    <div id="paymentAlert"></div>

    <!-- Checkout Alert -->
    <div id="checkoutAlert"></div>

    <!-- Active Boarders -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">Currently Boarding</span>
        <span id="boarderCount" style="font-size:12px;color:var(--muted);"></span>
      </div>
      <div class="section-body">
        <div id="boardingGrid" class="boarding-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Check In Modal -->
<div class="modal-overlay" id="checkinModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Dog Check-In</span>
      <button class="modal-close" onclick="closeCheckin()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group" style="position:relative;">
        <label class="form-label">Client Name <span style="color:var(--muted);font-weight:400;">(type to autofill)</span></label>
        <input class="form-input" id="ciClient" placeholder="Owner name" oninput="ciClientSearch()" onblur="hideCiAutocomplete()" autocomplete="off">
        <div class="autocomplete-list" id="ciClientSuggestions" style="display:none;"></div>
      </div>
      <div class="form-group"><label class="form-label">Pet Name</label><input class="form-input" id="ciPet" placeholder="Dog's name"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Breed</label><input class="form-input" id="ciBreed" placeholder="Labrador"></div>
      <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="ciPhone" placeholder="9845099001"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Rate / Day (₹)</label><input class="form-input" id="ciRate" type="number" placeholder="800" oninput="calcTotal()"></div>
      <div class="form-group"><label class="form-label">Check-in Date</label><input class="form-input" type="date" id="ciCheckin" onchange="calcTotal()"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Check-out Date</label><input class="form-input" type="date" id="ciCheckout" onchange="calcTotal()"></div>
      <div class="form-group"></div>
    </div>
    <div id="totalPreview" style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;padding:12px;font-size:14px;color:var(--accent);margin-bottom:16px;display:none;"></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="ciNotes" placeholder="Vaccination status, special diet, etc."></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeCheckin()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCheckin()">Confirm Check-In</button>
    </div>
  </div>
</div>

<!-- Checkout Confirm Modal -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Confirm Check-Out</span>
      <button class="modal-close" onclick="closeCheckoutModal()">✕</button>
    </div>
    <div id="checkoutModalContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/whatsapp.js"></script>
<script src="../js/layout.js"></script>
<script src="boarding.js"></script>
</body>
</html>
